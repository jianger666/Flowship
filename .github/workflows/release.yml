# 发版流水线：push 一个 v* tag → 自动 build → 传 GitHub Release
# 唯一交付物 = Electron 安装包：win nsis（exe + latest.yml、electron-updater 自动更新）+ mac dmg
# 流程：ubuntu job build standalone server（纯 JS 跨平台、一份给 win/mac 复用）+ 建 release 占位；
#       win/mac matrix job 各自打安装包、electron-builder --publish 追加 asset 到同 release
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本从 package.json 的 packageManager 字段读、不在这双写
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # node-linker=hoisted：node_modules 平铺实体（npm 风格、无 pnpm symlink 拓扑）、
      # standalone trace 产物随之全实体——tar / nsis 跨 Windows 不再有 symlink
      # 兼容雷（pnpm isolated 布局的相对链接在 win 解压器上是死链）
      - run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - run: pnpm build
        env:
          BUILD_STANDALONE: "1"

      # 先建 release 占位（generate_release_notes）——让下游 win/mac electron job 的
      # electron-builder --publish 往同 tag release 追加 asset、不竞态创建。
      # 关键：建成 draft（不可见）——electron-builder getOrCreateRelease 会优先复用匹配
      # tag 的 draft（源码 if(release.draft) return release）、asset 全传完再由 finalize
      # 转正 published。draft 期间 /releases/latest 不指向它、自更新查不到 → 杜绝
      # 「用户在 dmg/yml 传完前就查到新版、下到残缺包」（v0.8.0 mac 自更新踩过、ditto 拷残缺炸）。
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

      # 给 electron job 复用的 server 布局（tar 保留权限 / 防 artifact zip 丢元数据）。
      # standalone 纯 JS 跨平台、ubuntu build 一份 win/mac 都用；且 win runner 上
      # next build 会撞 EPERM scandir "Application Data" junction、必须绕开
      - run: node scripts/assemble-electron-server.mjs && tar -czf app-server.tar.gz -C dist app-server

      - uses: actions/upload-artifact@v4
        with:
          name: app-server
          path: app-server.tar.gz
          retention-days: 1

  # Electron 安装包（win + mac 同构、矩阵跑）。
  # needs build-release：复用它 build 的 server 布局；也让它先建好 release 占位、
  # electron-builder 往同 tag release 追加 asset（exe / dmg / latest.yml）不竞态
  electron:
    needs: build-release
    strategy:
      # mac 未签名、dmg 只是顺手产物——失败不连坐 win
      fail-fast: false
      # 串行：win / mac 各自往同一个 draft release overwrite asset、并发会撞出
      # 0 字节的 latest.yml（v0.8.0 踩过、win electron-updater 全靠它、空了 win 自更新挂）——
      # 串行彻底避免 release asset 列表的并发 race
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            args: --win
            sdk_platform: win32-x64
          - os: macos-latest
            args: --mac
            sdk_platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # 只为装 electron + electron-builder（devDeps）、不在本机 build Next
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: app-server

      - run: mkdir -p dist && tar -xzf app-server.tar.gz -C dist
        shell: bash

      # 修平台依赖（v0.7.6）：server 布局是 ubuntu 组的——
      # 1. sqlite3 的 .node 是 linux 二进制、win/mac 上加载直接炸（ERR_DLOPEN_FAILED）
      # 2. SDK 平台工具包（@cursor/sdk-<platform>、含 ripgrep / 沙箱 helper）是运行时
      #    动态拼名加载、构建追踪追不到、整包缺失
      # 在目标平台 runner 上重装对应平台版本（npm 单包安装、不动树里其它东西）
      - run: |
          # 版本读已装包的真实版本（不带 ^、跟 ubuntu 解析结果钉死一致）
          SDK_VERSION=$(node -p "require('./node_modules/@cursor/sdk/package.json').version")
          SQLITE_VERSION=$(node -p "require('./node_modules/sqlite3/package.json').version")
          # standalone 的 package.json 是根拷贝、带 overrides 字段、
          # 跟命令行直装的 sqlite3 撞 npm EOVERRIDE——删掉（运行时不读这些字段）
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.overrides;delete p.pnpm;fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
          npm install --no-save --no-package-lock --omit=dev "@cursor/sdk-${{ matrix.sdk_platform }}@${SDK_VERSION}" "sqlite3@${SQLITE_VERSION}"
          # 实加载验真：错架构的 .node 在这里当场炸、不带病发版
          node -e "require('sqlite3'); console.log('sqlite3 native ok')"
          node -p "require('@cursor/sdk-${{ matrix.sdk_platform }}/package.json').version + ' platform pkg ok'"
        shell: bash
        working-directory: dist/app-server

      # 壳的 runtime 依赖（只有 electron-updater）、装进 electron-app/node_modules 进 asar。
      # 必须用 pnpm（跟根项目一致）：electron-builder 按根 lockfile 判定 pm=pnpm、
      # npm 风格的 node_modules 收集不到、会 fallback 把主项目全家桶打进 asar（271M 事故）
      - run: pnpm install --frozen-lockfile
        working-directory: electron-app

      # 壳版本号 = tag 版本（electron-updater 按它比对新旧版、必须每次发版递增）
      - run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        shell: bash
        working-directory: electron-app

      - run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # mac 不签名（内部分发）、关掉证书自动发现防 CI 报错
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

  # 所有平台包（exe / dmg / latest.yml / latest-mac.yml）都传完后、把 draft release 转正 published。
  # needs electron = win/mac 都成功才转正：有平台挂就留 draft、不对外发半成品（手动看日志重跑即可）。
  # 转正后 /releases/latest 才指向它、mac fetchLatestVersion / win electron-updater 这才查得到、
  # 且此刻 asset 已齐全——根治 v0.8.0「asset 没传完就被自更新下到残缺」的事故。
  finalize:
    needs: electron
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const draft = releases.find((r) => r.tag_name === tag && r.draft);
            if (!draft) {
              core.info(`没找到 tag=${tag} 的 draft release、跳过`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: draft.id,
              draft: false,
            });
            core.info(`已发布 release ${tag}`);
