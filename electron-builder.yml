# ai-flow Electron 打包配置（V0.7.0）
#
# 结构说明：壳代码在 electron-app/（独立 package.json、runtime 依赖只有 electron-updater）。
# 不用单 package.json 结构——主 package.json 的 dependencies 是 next/react 全家桶、
# electron-builder 会把 production deps 全拖进 asar、包体直接爆炸；server 侧依赖
# 已经由 Next standalone 自己 trace 好、走 extraResources 进包。
# appId 永远不改（win updater / 安装器按它认应用、改了升级会裂成两个 app）
appId: com.jianger.fe-ai-flow
# 显示名（桌面图标 / 开始菜单 / .app 名 / userData 目录名）
productName: AI工作流

directories:
  app: electron-app
  output: dist/electron
  # 构建资源目录（icon.png 在这、builder 自动转各平台 ico/icns）；
  # 不用默认的 build/——.gitignore 把 build 整个忽略了
  buildResources: packaging

# electron-updater 没有 native 依赖、跳过 rebuild 省时间
npmRebuild: false

# 7z 压缩拉满（V0.11.4、实测 win exe 213.6MB → 112MB、-48%）：
# LZMA 解压速度和压缩级别基本无关（安装慢卡在落盘 300MB + Defender 扫描、不卡解压）、
# 压缩级别只影响 CI 打包时长（每平台 +3-5min）——用户下载量减半、纯赚。
# 历史：v0.8.10 曾把级别降到 3 想提安装速度、实测体积/速度都没变化（前后都 213MB）、已回收。
compression: maximum

# 语言包瘦身：Electron/Chromium 默认塞 ~220 国 locale（mac .lproj / win .pak、~47M 死重）。
# 只留中英——本应用 UI 全自绘中文、仅 Chromium 原生右键菜单/表单提示会用到 locale、中英足够。
# 不影响 icudtl.dat（中文显示/排序/日期格式照常）。
# mac 文件名用下划线(zh_CN.lproj)、win 用连字符(zh-CN.pak)、两种都列以兼容双平台；
# electron-builder 按小写 exact/prefix 匹配、匹配不到的值无害跳过（需 >=26.12.0、已 ^26.15.2）。
electronLanguages:
  - en
  - en-US
  - zh-CN
  - zh_CN

# 组好的 server 布局（standalone + prompts/skills/scripts、已删 data/ 防隐私泄漏）
# 由 afterPack hook 拷进 resources/app-server、不进 asar——server 运行时要 fs 读自己
# 旁边的文件。不走 extraResources：builder copier 硬排除 node_modules、依赖树会被丢
afterPack: scripts/electron-after-pack.mjs

# 产物文件名写死 ascii（不跟 productName 走中文）——GitHub asset url 和
# latest.yml 引用的文件名保持英文、electron-updater 下载链路稳
artifactName: "fe-ai-flow-${version}-${os}-${arch}.${ext}"

win:
  target: nsis
  # Windows 不会自动给图标加圆角——win 用满画布预圆角（透明角）；
  # mac 用 packaging/icon.png = Big Sur 官方模板（1024 画布 + 824 squircle 居中留白）：
  # pre-Tahoe 原样显示即标准圆角、Tahoe 识别标准形状自动适配（v1.0.x 换 logo 时定稿；
  # 注意不能用「满画布预圆角」——非标准形状会被 Tahoe 垫成白底方块、v0.7.x 踩过）。
  # 图标产出：node scripts/brand/render-icons.mjs（模板 scripts/brand/icon-template.html）
  icon: icon-win.png

nsis:
  # 助手式向导（V0.7.21）：关一键、让用户能在向导里选安装路径。
  # oneClick:false 后首次手动安装走向导（许可 / 选路径 / 快捷方式 / 装）、
  # 但 electron-updater 自更新仍走静默（/S）、升级体验不变。
  oneClick: false
  allowToChangeInstallationDirectory: true
  # 仍 per-user 装到用户目录、不强制管理员权限 / UAC
  perMachine: false
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch:
        - arm64
  # 不签名（内部分发、首次打开需右键 →「打开」过 Gatekeeper）
  identity: null

dmg:
  # UDBZ=bzip2（V0.11.4、实测 215MB → 118MB、-45%）。原 ULFO（LZFSE）为挂载速度选的、
  # 但实测 UDBZ 挂载 25s + 全量拷出 12s——安装/自更新多花半分钟、换下载少 ~100MB、净赚。
  # 注：ULMO（LZMA）实测更小（97MB）但 electron-builder 26.15.2 schema 不认、CI 直接拒（踩过）。
  format: UDBZ

# electron-builder 自动产 latest.yml 一起传 GitHub Release、electron-updater 靠它发现新版。
# releaseType: release——CI 的 build-release job 先建好正式 release、electron 矩阵 job 往同 tag 追加安装包 asset
publish:
  provider: github
  owner: jianger666
  repo: fe-ai-flow
  releaseType: release
